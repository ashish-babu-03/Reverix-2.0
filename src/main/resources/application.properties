# Server
server.port=${PORT:10000}
spring.application.name=reverix

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/reverix_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Render deployment optimizations
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false
logging.level.org.hibernate=ERROR
logging.level.liquibase=WARN
logging.level.org.springframework=WARN

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# JWT
app.jwt.secret=${JWT_SECRET:reverix-super-secret-key-for-jwt-minimum-48-chars-long}
app.jwt.expiration=86400000

# OpenRouter
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=meta-llama/llama-3.3-70b-instruct:free

# TMDb
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.base-url=https://api.themoviedb.org/3
tmdb.api.poster-base-url=https://image.tmdb.org/t/p/w500


# Resilience4j
resilience4j.circuitbreaker.instances.openrouter.sliding-window-size=10
resilience4j.circuitbreaker.instances.openrouter.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openrouter.wait-duration-in-open-state=30s

logging.level.org.springframework.boot=DEBUG
logging.level.com.reverix=DEBUG