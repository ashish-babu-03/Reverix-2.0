<!DOCTYPE html>
<html>
<head><title>Reverix Chat Test</title></head>
<body>
<input id="msg" placeholder="Type your mood..."/>
<button onclick="send()">Send</button>
<div id="output"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    const socket = new SockJS('http://localhost:8080/ws');
    const client = Stomp.over(socket);
    client.connect({}, () => {
        console.log('Connected!');
        client.subscribe('/topic/response', msg => {
            const data = JSON.parse(msg.body);
            document.getElementById('output').innerHTML += '<p>' + data.reply + '</p>';
        });
    });
    function send() {
        const msg = document.getElementById('msg').value;
        client.send('/app/chat', {}, JSON.stringify({
            userId: 1,
            message: msg,
            sessionContext: "mood based booking assistant"
        }));
    }
</script>
</body>
</html>
